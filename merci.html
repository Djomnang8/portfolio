<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé - John Doe</title>
    <style>
        body {
            font-family: 'Source Sans Pro', sans-serif;
            background: linear-gradient(to right, rgba(138, 43, 226, 0.8), rgba(138, 43, 226, 0.8)), url(./assets/svg/common-bg.svg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.8rem;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1.5rem 3rem;
            background: white;
            color: #8A2BE2;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
        }

</head>
<body>
    <div class="container">
        <h1>✅ Message envoyé !</h1>
        <p>Merci pour votre message. Je vous répondrai dans les plus brefs délais.</p>
